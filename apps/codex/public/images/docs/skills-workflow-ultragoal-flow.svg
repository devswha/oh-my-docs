<svg width="1536" height="864" viewBox="0 0 1536 864" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ug-rail-title ug-rail-desc">
  <title id="ug-rail-title">Ultragoal durable goal workflow</title>
  <desc id="ug-rail-desc">A large plan becomes one aggregate goal, durable milestone cards, an append-only ledger, an explicit goal handoff, and a final verification gate.</desc>
  <defs>
    <linearGradient id="ug-rail-bg" x1="100" y1="80" x2="1420" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.56" stop-color="#0C1C33"/>
      <stop offset="1" stop-color="#102E56"/>
    </linearGradient>
    <linearGradient id="ug-rail-card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#163963"/>
      <stop offset="1" stop-color="#0B223D"/>
    </linearGradient>
    <linearGradient id="ug-rail-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="ug-rail-violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C084FC"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="ug-rail-green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="ug-rail-shadow" x="-18%" y="-22%" width="136%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="21" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <filter id="ug-rail-glow" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.24 0 0 0 0 0.76 0 0 0 0 0.98 0 0 0 0.44 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <marker id="ug-rail-arrow" markerWidth="18" markerHeight="18" refX="13" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M3 3L14 9L3 15" stroke="#8BDCF6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <pattern id="ug-rail-grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" stroke="#93C5FD" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

