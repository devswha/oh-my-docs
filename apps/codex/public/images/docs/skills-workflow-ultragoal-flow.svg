<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ug-minimal-title ug-minimal-desc">
  <title id="ug-minimal-title">Ultragoal minimal workflow diagram</title>
  <desc id="ug-minimal-desc">A minimal line diagram showing an approved plan flowing through durable stories, a ledger, an explicit goal handoff, and a final verification gate.</desc>
